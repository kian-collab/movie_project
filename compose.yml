version: '3'

services:

  web:
    build: .
    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: mysql:8

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: movie

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
